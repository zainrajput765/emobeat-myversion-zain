version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./emotion_resnet18.pth:/emotion_resnet18.pth
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - FRONTEND_URL=http://localhost:5173

  frontend:
    build: .
    ports:
      - "5173:80"
    depends_on:
      - backend
